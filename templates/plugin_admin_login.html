<!DOCTYPE html>
<html><head><title>Admin Login</title><meta charset="utf-8">
<link rel="stylesheet" type="text/css" href="/static/css/login.css">
</head>
<body>
    <div class="container" style="max-width: 400px; margin-top: 100px;">
        <div class="login-title">Admin Aggregator</div>
        <div class="login-subtitle">GESTIUNE CENTRALIZATĂ</div>
        <form method="post">
            <input type="password" name="password" placeholder="Parolă Admin" required autofocus style="width: 100%; box-sizing: border-box;"><br>
            <button type="submit" style="width: 100%; box-sizing: border-box; margin-top: 15px;">Autentificare</button>
        </form>
        {% if error %}<p class="error">{{ error }}</p>{% end %}
    </div>
</body></html>
