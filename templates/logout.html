<!DOCTYPE html>
<html><head><title>Logged Out</title><meta charset="utf-8">
<style>
    body {
        font-family: 'Segoe UI', Arial, sans-serif; 
        text-align: center; 
        margin-top: 100px; 
        background: #1a1a1a; 
        color: #e0e0e0;
    }
    .container {
        width: 400px; 
        margin: 0 auto; 
        background: #2a2a2a; 
        padding: 30px; 
        border-radius: 10px; 
        box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }
    .success {
        color: #28a745; 
        font-size: 18px; 
        margin-bottom: 20px;
    }
    .btn {
        background: #007bff; 
        color: white; 
        border: none; 
        padding: 10px 20px; 
        border-radius: 5px; 
        cursor: pointer; 
        text-decoration: none; 
        display: inline-block;
    }
    .btn:hover {
        background: #0056b3;
    }
    .about-btn-login {
        position: fixed;
        top: 15px;
        right: 15px;
        background: #007bff;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        width: 40px;
        height: 40px;
        z-index: 1000;
    }
    .about-btn-login:hover {
        background: #0056b3;
    }
</style></head>
<body>
    <button class="about-btn-login" onclick="openAboutModal()">?</button>
    <div class="container">
        <div class="success">You have been successfully logged out</div>
        <p>Thank you for using ComfyUI.</p>
        <a href="/login" class="btn">Login Again</a>
    </div>
    {% raw about_modal %}
</body></html>
